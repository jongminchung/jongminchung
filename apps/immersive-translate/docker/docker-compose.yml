name: immersive-translate

services:
  gateway:
    build:
      context: ..
      dockerfile: docker/gateway.Dockerfile
    image: immersive-translate-gateway:local
    working_dir: /app
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      TRANSLATION_PROFILE: ${TRANSLATION_PROFILE:-libretranslate}
      GATEWAY_HOST: 0.0.0.0
      GATEWAY_PORT: 5000
      LIBRETRANSLATE_URL: ${LIBRETRANSLATE_URL:-http://libretranslate:5000/translate}
      MLX_BASE_URL: ${MLX_BASE_URL:-http://host.docker.internal:8000/v1}
      MLX_MODEL: ${MLX_MODEL:-mlx-community/Qwen3-1.7B-4bit}
      MLX_FALLBACK_MODEL: ${MLX_FALLBACK_MODEL:-mlx-community/Qwen3-1.7B-4bit}
      MLX_TEMPERATURE: ${MLX_TEMPERATURE:-0}
      MLX_MAX_TOKENS: ${MLX_MAX_TOKENS:-1024}
      GATEWAY_LOG_REQUESTS: ${GATEWAY_LOG_REQUESTS:-true}
      GATEWAY_LOG_FILE: ${GATEWAY_LOG_FILE:-/app/.output/gateway-requests.log}
    volumes:
      - ..:/app:ro
      - ../.output:/app/.output
    command: ["pnpm", "node", "gateway/server.ts"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'pnpm node -e "const r=await fetch(''http://127.0.0.1:5000/health''); if(!r.ok) process.exit(1)"',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  libretranslate:
    image: libretranslate/libretranslate:v1.9.6
    user: root
    ports:
      - "127.0.0.1:${LIBRETRANSLATE_DEBUG_PORT:-5001}:5000"
    environment:
      LT_LOAD_ONLY: ${LIBRETRANSLATE_LANGUAGES:-en,ko}
      LT_DISABLE_FILES_TRANSLATION: "true"
      LT_DISABLE_WEB_UI: "true"
    volumes:
      - libretranslate-data:/home/libretranslate/.local
      - ${LOCAL_CA_CERT:-./certs/local-ca.crt}:/usr/local/share/ca-certificates/local-ca.crt:ro
    entrypoint:
      - /bin/bash
      - -lc
      - |
        set -e
        cert=/usr/local/share/ca-certificates/local-ca.crt
        if [ -s "$${cert}" ] && grep -q "BEGIN CERTIFICATE" "$${cert}"; then
          if command -v update-ca-certificates >/dev/null 2>&1; then
            update-ca-certificates
          else
            cat "$${cert}" >> /etc/ssl/certs/ca-certificates.crt
          fi
        fi
        exec ./scripts/entrypoint.sh
    healthcheck:
      test: ["CMD-SHELL", "./venv/bin/python scripts/healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 2m
    restart: unless-stopped

volumes:
  libretranslate-data:
